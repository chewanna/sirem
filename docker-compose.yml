name: sirem

services:
  db:
    image: neo4j:5-community
    container_name: sirem_db
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/sirem_password
      # APOC (Awesome Procedures On Cypher) is standard and very useful
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    healthcheck:
      test: wget http://localhost:7474 -O /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: sirem_app
    restart: always
    volumes:
      - ./app:/usr/src/app/app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mongodb://db:27017/sismov?directConnection=true
      USE_VLLM: "true"
      VLLM_URL: "http://vllm:8000/v1/chat/completions"
      USE_OLLAMA: "false"
    develop:
      watch:
        - action: sync
          path: ./app
          target: /usr/src/app/app
        - action: rebuild
          path: package.json
    depends_on:
      db:
        condition: service_healthy
      vllm:
        condition: service_started

  vllm:
    image: vllm/vllm-openai:latest
    container_name: sirem_vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - huggingface_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    # Llama 3.1 8B Instruct AWQ INT4 cuantizado, cabe en 8GB de VRAM
    # gpu-memory-utilization a 0.85 para evitar OOM, y max-model-len ajustado
    command: >-
      --model hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4 --quantization awq --dtype half --gpu-memory-utilization 0.85 --max-model-len 4096 --port 8000
    shm_size: '4gb'
volumes:
  neo4j_data:
  neo4j_plugins:
  huggingface_data:
